<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tax Calculator</title>
</head>
<body>

  <h2>Tax Calculator</h2>

  <p>
    <label><b>Amount</b></label><br />
    &#8377; <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" size="20" />
  </p>

  <p>
    <label><b>Tax Percentage</b></label><br />
    <input type="number" id="rate" placeholder="0" min="0" max="100" step="0.01" size="10" /> %
  </p>

  <p>
    Quick set:
    <input type="button" value="5%"  onclick="document.getElementById('rate').value=5;calc();" />
    <input type="button" value="12%" onclick="document.getElementById('rate').value=12;calc();" />
    <input type="button" value="18%" onclick="document.getElementById('rate').value=18;calc();" />
    <input type="button" value="28%" onclick="document.getElementById('rate').value=28;calc();" />
  </p>

  <p>
    <input type="button" value="Calculate" onclick="calc();" />
    &nbsp;
    <input type="button" value="Reset" onclick="document.getElementById('amount').value='';document.getElementById('rate').value='';calc();" />
  </p>

  <hr />

  <table>
    <tr>
      <td>Amount</td>
      <td>&nbsp;&nbsp;</td>
      <td><b id="o_amount">&#8377; 0.00</b></td>
    </tr>
    <tr>
      <td>Tax Amount</td>
      <td>&nbsp;&nbsp;</td>
      <td><b id="o_tax">&#8377; 0.00</b></td>
    </tr>
    <tr>
      <td colspan="3"><hr /></td>
    </tr>
    <tr>
      <td><b>Total Amount</b></td>
      <td>&nbsp;&nbsp;</td>
      <td><b id="o_total">&#8377; 0.00</b></td>
    </tr>
  </table>

  <script>
    function calc() {
      var a = parseFloat(document.getElementById('amount').value) || 0;
      var r = parseFloat(document.getElementById('rate').value) || 0;
      var t = a * r / 100;
      document.getElementById('o_amount').textContent = '\u20B9 ' + a.toFixed(2);
      document.getElementById('o_tax').textContent    = '\u20B9 ' + t.toFixed(2);
      document.getElementById('o_total').textContent  = '\u20B9 ' + (a + t).toFixed(2);
    }
  </script>

</body>
</html>
